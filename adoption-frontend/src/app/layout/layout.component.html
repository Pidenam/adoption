<div class="layout">

  <aside class="sidebar">
    <div class="sb-logo">
      <!--div class="sb-logo-icon"><i class="ti ti-scale"></i></div-->
      <div>
        <div class="sb-logo-txt">Comité National d'Adoption</div>
        <div class="sb-logo-sub">République togolaise</div>
      </div>
    </div>

    <nav class="sb-nav">
      <div class="sb-section">PRINCIPAL</div>
      <div class="sb-item" [class.active]="menuActif==='dashboard'"
        (click)="naviguer('dashboard','/dashboard')">
        <i class="ti ti-layout-dashboard"></i><span>Tableau de bord</span>
      </div>

      <div class="sb-section">GESTION</div>
      <div class="sb-item" [class.active]="menuActif==='orphelins'"
        (click)="naviguer('orphelins','/orphelins')">
        <i class="ti ti-baby-carriage"></i><span>Orphelins</span>
      </div>

      <div class="sb-section">ADMINISTRATION</div>
      <div class="sb-item" [class.active]="menuActif==='utilisateurs'"
        (click)="naviguer('utilisateurs','/utilisateurs')">
        <i class="ti ti-users"></i><span>Utilisateurs</span>
      </div>
      <div class="sb-item" [class.active]="menuActif==='roles'"
        (click)="naviguer('roles','/roles')">
        <i class="ti ti-shield-lock"></i><span>Rôles & permissions</span>
      </div>
    </nav>

    <div class="sb-foot">
      <div class="sb-prof">
        <div class="sb-av">{{ getInitiale() }}</div>
        <div>
          <div class="sb-pn">{{ getNomUtilisateur() }}</div>
          <div class="sb-pe">{{ getRole() }}</div>
        </div>
      </div>
      <div class="sb-logout" (click)="seDeconnecter()">
        <i class="ti ti-logout"></i><span>Se déconnecter</span>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="togo-stripe">
      <span style="background:#006633"></span>
      <span style="background:#FFD100"></span>
      <span style="background:#CC0000"></span>
      <span style="background:#FFD100"></span>
      <span style="background:#006633"></span>
    </div>

    <header class="topbar">
      <div class="tb-left">
        <div class="tb-title">
          <i [class]="getPageIcon()"></i>
          {{ getPageTitle() }}
        </div>
        <div class="tb-sub">{{ dateAujourdhui }}</div>
      </div>
      <!--div class="tb-search">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Recherche globale..." [(ngModel)]="rechercheGlobale"/>
      </div-->
      <div class="tb-right">
        <div class="tb-btn">
          <i class="ti ti-bell"></i>
          <div class="tb-dot"></div>
        </div>
        <div class="tb-btn"><i class="ti ti-settings"></i></div>
        <div class="tb-avatar">{{ getInitiale() }}</div>
      </div>
    </header>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
